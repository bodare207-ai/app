name: Viraj Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build with Buildozer
        # Using the correct latest version of the buildozer action
        uses: ArtemSerebriakov/buildozer-action@v1.6.1
        with:
          workdir: .
          
      - name: Upload APK
        # Using v4 which is the latest and fastest version
        uses: actions/upload-artifact@v4
        with:
          name: VirajRemote-APK
          path: bin/*.apk
